name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Verify
        run: ./gradlew :compose-atlas-annotation:build :compose-atlas-ksp:test :compose-atlas-runtime:testDebugUnitTest :compose-atlas-navigation:testDebugUnitTest :sample-app:assembleDebug :demo-app:assembleDebug

      - name: Verify publication metadata
        run: ./gradlew publishAllPublicationsToLocalBuildRepository
